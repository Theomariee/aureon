name: Release

# Publie les installeurs Windows (.exe) et macOS (.dmg) dès qu'un tag vX.Y.Z est poussé.
#
# Le build et la publication sont volontairement séparés :
#   - les runners construisent SANS publier (--publish never) et déposent les
#     installeurs en artefacts de workflow ;
#   - un unique job final les attache à la Release via le CLI `gh`, puis vérifie
#     que chaque asset est bien en état "uploaded".
# electron-builder --publish échouait silencieusement sur les uploads ~100 Mo
# (job vert, release vide) : on ne lui confie plus la publication.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # lancement manuel : construit les artefacts sans publier

permissions:
  contents: write # nécessaire pour créer la Release et y attacher les fichiers

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      # electron-builder cible automatiquement la plateforme du runner :
      # windows-latest -> .exe (nsis), macos-latest -> .dmg (universal).
      - name: Package installer
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # build macOS non signé (pas de certificat Apple)

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error # échoue bruyamment si rien n'a été produit
          retention-days: 5

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') # dispatch manuel = build seul
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh artifacts

      - name: Create or update the GitHub Release
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets (clobber)."
            gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG."
            # Titre = numéro de version nu (sans le "v" ni le nom du produit).
            gh release create "$TAG" artifacts/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "${TAG#v}" \
              --generate-notes
          fi

      - name: Verify installers are really attached
        run: |
          set -euo pipefail
          echo "Assets attached to $TAG:"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[] | "  \(.name)  \(.size) bytes  [\(.state)]"'

          names=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          missing=0
          for ext in .exe .dmg; do
            echo "$names" | grep -q -- "$ext" || { echo "::error::Aucun asset $ext dans la release"; missing=1; }
          done
          # Un upload interrompu laisse l'asset dans un état != "uploaded".
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
               --json assets --jq '.assets[].state' | grep -qv '^uploaded$'; then
            echo "::error::Certains assets ne sont pas en état 'uploaded'"
            missing=1
          fi
          exit $missing
