name: Release

# Publie les installeurs Windows (.exe) et macOS (.dmg) dès qu'un tag vX.Y.Z est poussé.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # permet aussi un lancement manuel depuis l'onglet Actions

permissions:
  contents: write # nécessaire pour créer la Release et y attacher les fichiers

jobs:
  release:
    strategy:
      # Sérialisé (un seul job à la fois) : le 1er runner crée la Release
      # GitHub, le 2e la retrouve et y ajoute son installeur. En parallèle,
      # les deux tentent de créer la Release et le plus lent échoue en
      # « 422 already_exists ».
      max-parallel: 1
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      # electron-builder cible automatiquement la plateforme du runner :
      # windows-latest -> .exe (nsis), macos-latest -> .dmg (universal).
      - name: Package & publish installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false # build macOS non signé (pas de certificat Apple)
