<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7dc94"/>
      <stop offset="0.55" stop-color="#ecc06a"/>
      <stop offset="1" stop-color="#cf9f38"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.9" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#7a5b16" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Rounded gold plate -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#gold)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#vignette)"/>

  <!-- Soft shadow under the gem -->
  <ellipse cx="256" cy="356" rx="150" ry="34" fill="#5a4310" opacity="0.35" filter="url(#shadow)"/>

  <!-- Faceted gem -->
  <g stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.6" stroke-linejoin="round">
    <!-- crown -->
    <polygon points="196,150 176,214 132,214" fill="#0e1320"/>
    <polygon points="316,150 380,214 336,214" fill="#1e2841"/>
    <polygon points="196,150 316,150 336,214 176,214" fill="#2b3654"/>
    <!-- pavilion -->
    <polygon points="132,214 176,214 256,372" fill="#0f1522"/>
    <polygon points="176,214 256,214 256,372" fill="#182138"/>
    <polygon points="256,214 336,214 256,372" fill="#212b47"/>
    <polygon points="336,214 380,214 256,372" fill="#131b2c"/>
  </g>

  <!-- Glint on the table -->
  <polygon points="208,162 250,162 224,198" fill="#ffffff" fill-opacity="0.16"/>

  <!-- Outer contour -->
  <polygon points="196,150 316,150 380,214 256,372 132,214" fill="none"
           stroke="#000000" stroke-opacity="0.30" stroke-width="3" stroke-linejoin="round"/>
</svg>
