appId: com.aureon.app
productName: Aureon
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
mac:
  icon: build/icon.png
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - universal
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Aureon
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
# Conservé pour la génération des métadonnées de mise à jour (latest*.yml).
# La publication elle-même est faite par le workflow via le CLI `gh`.
publish:
  provider: github
  owner: Theomariee
  repo: aureon
  releaseType: release
